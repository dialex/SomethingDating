<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#fff1f2" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#fff1f2" media="(prefers-color-scheme: dark)" />
  <meta name="description" content="Something Dating — a step-by-step dating guide to help you navigate every stage with confidence." />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Something Dating" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="images/logo/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Open+Sans:wght@400;600;700&family=Gorditas:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <title>Something Dating</title>
</head>
<body>

  <!-- Install instructions modal -->
  <div class="modal-backdrop hidden" id="install-modal">
    <div class="modal">
      <div class="modal-title">Add to Home screen</div>
      <div class="modal-steps" id="modal-steps"></div>
      <button class="btn-modal-close" id="btn-modal-close">Got it</button>
    </div>
  </div>

  <header>
    <button class="btn-chevron" id="btn-chevron" aria-label="Back">
      <!-- lucide: chevron-left -->
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m15 18-6-6 6-6"/></svg>
    </button>
    <div class="home-header" id="home-header">
      <h1 class="home-title"><span class="title-line-top">Something about</span><span class="title-word-dating">Dating</span></h1>
      <p class="home-subtitle">A step-by-step guide, by Adam Something</p>
    </div>
    <div id="install-banner" class="install-banner" style="display:none">
      <div class="install-banner-icon">📲</div>
      <div class="install-banner-text">
        <strong>Add to Home screen</strong>
        <span>Use offline, like a native app</span>
      </div>
      <button class="install-banner-dismiss" id="btn-dismiss-banner" aria-label="Dismiss">
        <!-- lucide: x -->
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
      </button>
    </div>
  </header>

  <main id="main-content"></main>

  <!-- View templates (cloned and populated by js/app.js) -->
  <template id="tpl-home">
    <div class="section-grid" data-slot="grid"></div>
    <p class="home-footer-msg">Take your time with each phase. Great relationships are built step by step.</p>
    <div class="home-meta">
      <a href="#credits" class="btn-credits">Credits</a>
      <div id="app-version" data-slot="version"></div>
    </div>
  </template>

  <template id="tpl-section-card">
    <div class="section-card" data-slot="card">
      <div class="section-card-image" data-slot="image">
        <img class="section-card-photo" data-slot="photo" alt="" hidden />
        <div class="section-card-title" data-slot="title"></div>
      </div>
      <div class="section-card-footer">
        <span data-slot="steps"></span>
        <span class="section-card-cta">Start <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m9 18 6-6-6-6"/></svg></span>
      </div>
    </div>
  </template>

  <template id="tpl-wizard-step">
    <section class="wizard">
      <div class="wizard-phase-header">
        <h1 class="wizard-phase-title" data-slot="phase-title"></h1>
        <p class="wizard-phase-subtitle" data-slot="phase-subtitle"></p>
      </div>
      <div class="wizard-progress" data-slot="progress"></div>
      <div class="wizard-step-badge" data-slot="step-badge"></div>
      <article class="wizard-step-card">
        <h2 class="wizard-step-title" data-slot="step-title"></h2>
        <p class="wizard-step-description" data-slot="step-description" hidden></p>
        <div data-slot="extra"></div>
      </article>
    </section>
  </template>

  <template id="tpl-wizard-extra">
    <aside class="wizard-extra">
      <div class="wizard-extra-header">
        <div class="wizard-extra-icon" aria-hidden="true">
          <!-- lucide: lightbulb -->
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.7 1.3 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></svg>
        </div>
        <h3 class="wizard-extra-title" data-slot="title"></h3>
      </div>
      <div data-slot="body"></div>
    </aside>
  </template>

  <template id="tpl-wip">
    <div class="wip-card">
      <div class="wip-title" data-slot="title"></div>
      <p class="wip-sub">This section is still being written. Check back soon.</p>
    </div>
  </template>

  <footer>
    <div class="wizard-nav" id="wizard-nav">
      <button class="wizard-btn-restart" id="btn-restart" aria-label="Restart">
        <!-- lucide: undo-2 -->
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 14 4 9l5-5"/><path d="M4 9h10.5a5.5 5.5 0 0 1 5.5 5.5a5.5 5.5 0 0 1-5.5 5.5H11"/></svg>
      </button>
      <button class="wizard-btn-prev" id="btn-prev" aria-label="Back">
        <!-- lucide: x -->
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
      </button>
      <button class="wizard-btn-next" id="btn-next" aria-label="Next">
        <!-- lucide: heart -->
        <svg id="btn-next-icon-heart" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
        <!-- lucide: check -->
        <svg id="btn-next-icon-check" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:none"><path d="M20 6 9 17l-5-5"/></svg>
      </button>
    </div>
  </footer>

  <script type="module" src="js/app.js"></script>
</body>
</html>
