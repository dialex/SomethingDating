<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#7c3aed" />
  <meta name="description" content="A step-by-step dating guide to help you navigate every stage with confidence." />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Date Guide" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="stylesheet" href="css/styles.css" />
  <title>Dating Guide</title>
</head>
<body>

  <!-- Install instructions modal -->
  <div class="modal-backdrop hidden" id="install-modal">
    <div class="modal">
      <div class="modal-title">Add to Home Screen</div>
      <div class="modal-steps" id="modal-steps"></div>
      <button class="btn-modal-close" id="btn-modal-close">Got it</button>
    </div>
  </div>

  <header>
    <div class="app-title">Dating Guide</div>
    <div id="install-banner" class="install-banner" style="display:none">
      <div class="install-banner-icon">📲</div>
      <div class="install-banner-text">
        <strong>Add to Home Screen</strong>
        <span>Use offline, like a native app</span>
      </div>
      <div class="install-banner-dismiss" id="btn-dismiss-banner" aria-label="Dismiss">✕</div>
    </div>
    <div class="progress-wrap">
      <div class="progress-label">
        <span id="progress-text"></span>
        <strong id="progress-pct"></strong>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
    </div>
  </header>

  <main id="main-content"></main>

  <footer>
    <div class="nav-buttons">
      <button class="btn-prev" id="btn-prev" disabled>Previous</button>
      <button class="btn-next" id="btn-next">Next</button>
    </div>
    <button class="btn-reset" id="btn-reset">Reset to beginning</button>
    <button class="btn-back" id="btn-back">← Menu</button>
    <div id="app-version"></div>
  </footer>

  <script type="module" src="js/app.js"></script>
</body>
</html>
