<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#fff1f2" />
  <meta name="description" content="A step-by-step dating guide to help you navigate every stage with confidence." />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Date Guide" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Open+Sans:wght@400;600;700&family=Gorditas:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <title>Dating Guide</title>
</head>
<body>

  <!-- Install instructions modal -->
  <div class="modal-backdrop hidden" id="install-modal">
    <div class="modal">
      <div class="modal-title">Add to Home screen</div>
      <div class="modal-steps" id="modal-steps"></div>
      <button class="btn-modal-close" id="btn-modal-close">Got it</button>
    </div>
  </div>

  <header>
    <button class="btn-chevron" id="btn-chevron" aria-label="Back">
      <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"><path d="M15 6l-6 6 6 6" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <div class="home-header" id="home-header">
      <h1 class="home-title"><span class="title-line-top">Something on</span><span class="title-word-dating">Dating</span></h1>
      <p class="home-subtitle">A step-by-step dating guide, by Adam Something</p>
    </div>
    <div id="install-banner" class="install-banner" style="display:none">
      <div class="install-banner-icon">📲</div>
      <div class="install-banner-text">
        <strong>Add to Home screen</strong>
        <span>Use offline, like a native app</span>
      </div>
      <div class="install-banner-dismiss" id="btn-dismiss-banner" aria-label="Dismiss">✕</div>
    </div>
  </header>

  <main id="main-content"></main>

  <footer>
    <div class="wizard-nav" id="wizard-nav">
      <button class="wizard-btn-restart" id="btn-restart" aria-label="Restart">
        <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"><path d="M4 4v6h6M20 14a8 8 0 0 1-15.3 3.5M4 10a8 8 0 0 1 15.3-3.5" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button class="wizard-btn-prev" id="btn-prev" aria-label="Back">
        <svg viewBox="0 0 24 24" width="26" height="26" aria-hidden="true"><path d="M6 6l12 12M18 6L6 18" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"/></svg>
      </button>
      <button class="wizard-btn-next" id="btn-next" aria-label="Next">
        <svg id="btn-next-icon-heart" viewBox="0 0 24 24" width="26" height="26" aria-hidden="true"><path d="M12 20s-7-4.35-7-10a4 4 0 0 1 7-2.65A4 4 0 0 1 19 10c0 5.65-7 10-7 10z" fill="currentColor"/></svg>
        <svg id="btn-next-icon-check" viewBox="0 0 24 24" width="26" height="26" aria-hidden="true" style="display:none"><path d="M5 12.5l4.5 4.5L19 7" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
    <div class="footer-meta">
      <a href="#credits" class="btn-credits" id="btn-credits">Credits</a>
      <div id="app-version"></div>
    </div>
  </footer>

  <script type="module" src="js/app.js"></script>
</body>
</html>
